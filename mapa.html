<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Playfair+Display&display=swap" rel="stylesheet">

<title>Sistema A&M</title>

<style>
body {
    margin: 0;
    padding: 20px;
    color: white;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: black;
    overflow-x: hidden;
}

canvas.bg {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -2;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
}

p {
    font-size: 14px;
    opacity: 0.7;
}

.container {
    margin-top: 25px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 12px 18px;
    margin: 6px;
    border-radius: 25px;
    color: white;
    font-size: 13px;
    cursor: pointer;
}

#texto, #equacao {
    margin-top: 20px;
    font-size: 15px;
    opacity: 0;
    transition: 0.4s;
    max-width: 90%;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
}

.final-btn {
    margin-top: 20px;
    background: linear-gradient(45deg,#ff4d6d,#c77dff);
    border: none;
}

#graphContainer {
    width: 100%;
    height: 340px;
    margin-top: 25px;
    border-radius: 15px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
}

canvas.graph {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<canvas class="bg" id="bg"></canvas>

<h1>Pontos Onde Me Perdi</h1>
<p>E, de algum jeito, eu não quero me encontrar</p>

<div class="container">
    <button onclick="mostrar('sorriso')">Teu Sorriso</button>
    <button onclick="mostrar('olhos')">Teus Olhos</button>
    <button onclick="mostrar('jeito')">Teu Jeito</button>
    <button onclick="mostrar('humor')">Teu Humor</button>
    <button onclick="mostrar('voz')">Tua Voz</button>
    <button onclick="mostrar('beleza')">Tua Beleza</button>
</div>

<div id="texto"></div>
<div id="equacao"></div>

<button class="final-btn" onclick="resolver()">Equação de Compatibilidade</button>

<div id="graphContainer">
    <canvas class="graph" id="graph"></canvas>
</div>

<script>

const textos = {
    sorriso: "Com certeza está entre uma das maiores maravilhas do mundo, cada vez que vejo, ele tira qualquer peso de mim, deixando tudo mais leve.",
    olhos: "São neles que eu mais me perco, parecem duas estrelas brilhando juntas, iluminam meus dias, tal qual a lua ilumina a noite. E mesmo me perdendo neles, eu não quero nunca me encontrar.",
    jeito: "Uma das minhas coisas favoritas, na verdade tudo em ti é meu favorito, mas o teu jeitinho é único pra mim, parece que tu consegue combinar tudo de bom que existe e gerar uma personificação. Me ganhou em todos os aspectos.",
    humor: "Mais um dos melhores pontos que tu tem, eu acho incrível como tu consegue me fazer rir com qualquer coisa, o teu humor é leve, sutil, mas ao mesmo tempo ele é tão intenso, tão único.",
    voz: "Em tão pouco tempo, acabou se tornando um dos meus sons favoritos, mais marcante do que qualquer música que eu conheça ou possa existir. Eu até poderia tentar comparar com alguma letra de música ou algum solo de guitarra, mas qualquer tentativa seria vaga, porque o som da tua voz simplesmente foge de qualquer comparação possível.",
    beleza: "E é aqui que todos os pontos que citei antes convergem, formando a soma de tudo aquilo que me faz olhar pra ti de um jeito diferente. Não é só um conjunto de características, é uma presença inteira, algo que simplesmente não se repete."
};

function mostrar(k){
    let t=document.getElementById("texto");
    t.style.opacity=0;
    setTimeout(()=>{
        t.innerHTML=textos[k];
        t.style.opacity=1;
    },200);
}

const bg=document.getElementById("bg");
const bctx=bg.getContext("2d");

function resizeBG(){
    bg.width=innerWidth;
    bg.height=innerHeight;
}
resizeBG();
window.addEventListener("resize",resizeBG);

let stars=[];
for(let i=0;i<140;i++){
    stars.push({
        x:Math.random()*innerWidth,
        y:Math.random()*innerHeight,
        r:Math.random()*1.3,
        s:Math.random()*0.2+0.05
    });
}

function drawBG(){
    bctx.clearRect(0,0,bg.width,bg.height);
    stars.forEach(s=>{
        s.y+=s.s;
        if(s.y>bg.height){
            s.y=0;
            s.x=Math.random()*bg.width;
        }
        bctx.beginPath();
        bctx.fillStyle="white";
        bctx.shadowBlur=6;
        bctx.shadowColor="white";
        bctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        bctx.fill();
    });
    requestAnimationFrame(drawBG);
}
drawBG();

const g=document.getElementById("graph");
const ctx=g.getContext("2d");

let W,H;
let mode="idle";
let t=0;
let showGrid=false;

function resizeGraph(){
    const r=document.getElementById("graphContainer").getBoundingClientRect();
    W=r.width;
    H=r.height;
    g.width=W;
    g.height=H;
}
resizeGraph();
window.addEventListener("resize",resizeGraph);

function grid(){
    if(!showGrid) return;

    ctx.strokeStyle="rgba(255,255,255,0.08)";
    let step=30;

    for(let x=0;x<W;x+=step){
        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,H);
        ctx.stroke();
    }

    for(let y=0;y<H;y+=step){
        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(W,y);
        ctx.stroke();
    }

    ctx.strokeStyle="rgba(255,255,255,0.35)";
    ctx.beginPath();
    ctx.moveTo(W/2,0);
    ctx.lineTo(W/2,H);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,H/2);
    ctx.lineTo(W,H/2);
    ctx.stroke();
}

function heart(t){
    return {
        x:W/2 + 16*Math.pow(Math.sin(t),3)*10,
        y:H/2 - (13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*10
    };
}

function loop(){
    ctx.clearRect(0,0,W,H);
    grid();

    if(mode==="heart"){
        for(let i=0;i<t;i+=0.01){
            let p=heart(i);
            ctx.fillStyle="rgba(255,80,150,0.9)";
            ctx.beginPath();
            ctx.arc(p.x,p.y,2,0,Math.PI*2);
            ctx.fill();
        }
        if(t<Math.PI*2){
            t+=0.01;
        }
    }
    requestAnimationFrame(loop);
}
loop();

function resolver(){

    let eq=document.getElementById("equacao");

    let steps=[
        "E = a + l + u + i + s + i + o + m + o + r + g + a + n + a",
        "E = (Aluísio) + (Morgana)",
        "E² = (A + M)²",
        "E² = A² + 2AM + M²",
        "reduzindo...",
        "resultado final:",
        "Aluísio + Morgana"
    ];

    let i=0;
    eq.style.opacity=1;

    let interval=setInterval(()=>{
        eq.innerHTML=steps[i];
        i++;

        if(steps[i-1]==="Aluísio + Morgana"){
            showGrid=true;
            mode="heart";
            t=0;
        }

        if(i===steps.length){
            clearInterval(interval);
        }

    },2500);
}

</script>

</body>
</html>
